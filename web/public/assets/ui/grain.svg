<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" preserveAspectRatio="none">
  <defs>
    <filter id="grainFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="7" />
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.14"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="220" height="220" fill="#ffffff" filter="url(#grainFilter)"/>
</svg>
